name: ordostack

services:
  backend-api:
    build:
      context: ./backend-api
    container_name: ordostack-backend-api
    ports:
      - "8000:8000"
    environment:
      DATA_STORE: "mysql"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_NAME: "ordostack"
      DB_USER: "root"
      DB_PASSWORD: ""
      SCHEDULER_SERVICE_URL: "http://scheduler-service:8100"
      ML_SERVICE_URL: "http://ml-service:8200"
    depends_on:
      mysql:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.4
    container_name: ordostack-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "ordostack"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-u"
        - "root"
        - "--silent"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  scheduler-service:
    build:
      context: ./scheduler-service
    container_name: ordostack-scheduler-service
    ports:
      - "8100:8100"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=2).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ml-service:
    build:
      context: ./ml-service
    container_name: ordostack-ml-service
    ports:
      - "8200:8200"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health', timeout=2).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-dashboard:
    build:
      context: ./web-dashboard
    container_name: ordostack-web-dashboard
    ports:
      - "5173:5173"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
