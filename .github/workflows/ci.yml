name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-api:
    name: backend-api tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-api/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

  scheduler-service:
    name: scheduler-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scheduler-service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

  ml-service:
    name: ml-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

  web-dashboard:
    name: web-dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  browser-smoke:
    name: browser smoke
    runs-on: ubuntu-latest
    needs:
      - web-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: web-dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: web-dashboard
        run: npm run build

      - name: Start Vite preview
        working-directory: web-dashboard
        run: |
          npm run preview -- --host 127.0.0.1 --port 5173 &
          echo $! > ../vite-preview.pid
          for attempt in {1..30}; do
            curl -fsS -o /dev/null http://127.0.0.1:5173 && exit 0
            sleep 1
          done
          exit 1

      - name: Run browser smoke
        env:
          ORDOSTACK_DASHBOARD_URL: http://127.0.0.1:5173
        run: python scripts/browser_smoke.py

      - name: Upload browser screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-smoke
          path: artifacts/browser-smoke

  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config
