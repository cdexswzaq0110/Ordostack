name: ordostack-prod

services:
  backend-api:
    environment:
      ORDOSTACK_ENV: ${ORDOSTACK_ENV:-production}
      DATA_STORE: ${DATA_STORE:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-ordostack}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      SCHEDULER_SERVICE_URL: ${SCHEDULER_SERVICE_URL:-http://scheduler-service:8100}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8200}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
    ports: !reset []

  mysql:
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_DATABASE: ${DB_NAME:-ordostack}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
    ports: !reset []

  web-dashboard:
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://your-domain.example/api}
    ports: !reset []

  scheduler-service:
    ports: !reset []

  ml-service:
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - production
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/ordostack.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy
      web-dashboard:
        condition: service_healthy
