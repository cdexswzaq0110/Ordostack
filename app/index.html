<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store">
    <title>OrdoStack Draft Edition</title>
    <meta name="theme-color" content="#fbfaf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="OrdoStack">
    <link rel="manifest" href="./manifest.webmanifest?v=20260606-ordo1">
    <link rel="stylesheet" href="./styles.css?v=20260606-ordo1">
  </head>
  <body>
    <header class="app-header" aria-label="產品資訊">
      <div>
        <p class="app-label">OrdoStack</p>
        <h1 id="page-title">Draft Edition</h1>
      </div>
      <div class="header-meta" aria-label="使用方式">
        <span>今日規劃</span>
        <span>進度總覽</span>
      </div>
    </header>

    <main class="app-shell">
      <section class="planner-intro" aria-labelledby="today-title">
        <div>
          <p class="section-kicker">今日規劃</p>
          <h2 id="today-title">今日建議任務</h2>
          <p class="intro-copy">
            依照可用時間、優先級與完成狀態，整理今天最適合先完成的任務，協助使用者把讀書、刷題與專案推進到可執行的每日清單。
          </p>
        </div>
        <label class="time-input">
          <span class="label-text">今日可用時間</span>
          <span>
            <input data-available-minutes type="number" min="15" max="480" step="15" value="120">
            分鐘
          </span>
        </label>
      </section>

      <section class="layout">
        <form class="panel subject-form" data-subject-form>
          <p class="section-kicker">學習目標</p>
          <h2>建立目標</h2>
          <label>
            <span class="label-text">目標名稱</span>
            <input data-subject-title name="title" type="text" autocomplete="off" placeholder="輸入學習目標" required>
          </label>
          <p class="error" data-subject-error role="status" aria-live="polite"></p>
          <button class="add-subject-button" type="submit" aria-label="建立目標">+</button>
        </form>

        <section class="panel lead-panel" aria-labelledby="recommendation-title">
          <p class="section-kicker">今日建議</p>
          <h2 id="recommendation-title">優先任務</h2>
          <ol class="recommendation-list" data-recommendation-list></ol>
        </section>

        <section class="panel progress-panel" aria-labelledby="progress-title">
          <p class="section-kicker">進度</p>
          <h2 id="progress-title">本週進度</h2>
          <p class="completion-rate" data-completion-rate>0%</p>
          <ul class="summary-list" data-subject-summary></ul>
        </section>

        <section class="panel task-panel" aria-labelledby="task-list-title">
          <p class="section-kicker">任務清單</p>
          <h2 id="task-list-title">目標與任務</h2>
          <ul class="subject-list" data-subject-list></ul>
        </section>
      </section>
    </main>

    <script src="./core.js?v=20260606-ordo1"></script>
    <script src="./browser.js?v=20260606-ordo1"></script>
  </body>
</html>
